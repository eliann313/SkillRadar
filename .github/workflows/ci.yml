name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: "20"

jobs:
    # ─────────────────────────────────────────
    # 1. Code quality: lint + type-check + format
    # ─────────────────────────────────────────
    quality:
        name: Code Quality
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

            - name: Setup Node.js
              uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: TypeScript type check
              run: npm run type-check

            - name: ESLint
              run: npm run lint

            - name: Prettier format check
              run: npm run format:check

    # ─────────────────────────────────────────
    # 2. Tests
    # ─────────────────────────────────────────
    test:
        name: Tests
        runs-on: ubuntu-latest
        needs: quality
        steps:
            - name: Checkout
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

            - name: Setup Node.js
              uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm run test -- --coverage

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v4.5.0
              with:
                  fail_ci_if_error: false
              continue-on-error: true

    # ─────────────────────────────────────────
    # 3. Build
    # ─────────────────────────────────────────
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [quality, test]
        steps:
            - name: Checkout
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

            - name: Setup Node.js
              uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build Next.js app
              run: npm run build
              env:
                  NEXT_TELEMETRY_DISABLED: 1
                  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/testing"
                  AUTH_SECRET: "your-super-shared-secret-key"
                  NEXTAUTH_SECRET: "your-super-shared-secret-key"
                  PRISMA_SKIP_ENGINE_CHECK: "true"

            - name: Upload build artifact
              uses: actions/upload-artifact@efa1aef0e12e1762c9339396328328c3104e747a # v4.3.4
              with:
                  name: nextjs-build-${{ github.sha }}
                  path: .next/
                  include-hidden-files: true
                  retention-days: 7

    # ─────────────────────────────────────────
    # 4. E2E Tests (Playwright)
    # ─────────────────────────────────────────
    playwright:
        name: E2E Tests (Playwright)
        runs-on: ubuntu-latest
        needs: quality
        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: testing
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 10s
                    --health-retries 10
        steps:
            - name: Checkout
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

            - name: Setup Node.js
              uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Push Prisma Schema to Test DB
              run: npx prisma db push --skip-generate --accept-data-loss
              env:
                  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/testing"

            - name: Generate Prisma Client
              run: npx prisma generate
              env:
                  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/testing"

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playwright E2E Tests
              run: npx playwright test
              env:
                  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/testing"
                  AUTH_SECRET: "your-super-shared-secret-key"
                  NEXTAUTH_SECRET: "your-super-shared-secret-key"
                  ENABLE_GUEST_LOGIN: "true"
                  NODE_ENV: "development"
                  NEXT_PUBLIC_DISABLE_NOTIFICATIONS: "true"
                  USE_NEON_WEBSOCKETS: "false"

            - name: Upload Playwright Report
              uses: actions/upload-artifact@efa1aef0e12e1762c9339396328328c3104e747a # v4.3.4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
