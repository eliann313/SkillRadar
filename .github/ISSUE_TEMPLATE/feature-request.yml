name: ✨ Feature Request
description: Propose a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem / motivation
          description: What problem does this solve? Why does it matter?
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Other approaches you thought about

    - type: dropdown
      id: priority
      attributes:
          label: Priority (your perspective)
          options:
              - Low — nice to have
              - Medium — would improve my workflow
              - High — blocking me
      validations:
          required: true
